name: Deploy

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    if: github.repository == 'zeroth-agents/pyrana-roadmap'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Tag release
        run: |
          VERSION="v$(node -p 'require("./package.json").version')"
          git tag "$VERSION" 2>/dev/null && git push origin "$VERSION" || echo "Tag $VERSION already exists, skipping"

      - name: Deploy to Coolify
        run: |
          curl -sf "${{ secrets.COOLIFY_URL }}/api/v1/deploy?uuid=${{ secrets.COOLIFY_APP_UUID }}&force=true" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
