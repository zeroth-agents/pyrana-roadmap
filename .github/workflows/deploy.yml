name: Deploy to Coolify

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deployment
        run: |
          curl -sf "${{ secrets.COOLIFY_URL }}/api/v1/deploy?uuid=COOLIFY_UUID_REDACTED&force=true" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
